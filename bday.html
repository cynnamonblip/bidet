<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Pre-Birthday Celeb</title>

<style>
body {
    margin: 0;
    font-family: 'Poppins', sans-serif;
    background: linear-gradient(135deg, #4a1515, #6e2626);
    color: white;
    text-align: center;
    display: flex;
    justify-content: center;
    align-items: center;
    height: 100vh;
}

.container {
    padding: 20px;
}

h1 {
    font-size: 2rem;
}

.buttons {
    margin-top: 30px;
    position: relative;
    height: 150px;
}

button {
    padding: 15px 25px;
    font-size: 18px;
    border: none;
    border-radius: 12px;
    cursor: pointer;
}

#yesBtn {
    background: #00c853;
    color: white;
}

#noBtn {
    background: #d50000;
    color: white;
    position: absolute;
}

#details {
    display: none;
    margin-top: 25px;
    background: rgba(0,0,0,0.3);
    padding: 15px;
    border-radius: 10px;
}

canvas {
    position: fixed;
    top: 0;
    left: 0;
    pointer-events: none;
}

@media (max-width: 600px) {
    h1 { font-size: 1.5rem; }
}
</style>
</head>

<body>

<canvas id="confetti"></canvas>

<!-- Correct YouTube embed URL for autoplay muted -->
<iframe id="ytplayer"
  width="0" height="0"
  src="https://www.youtube.com/embed/Q6l_9ehyywU?autoplay=1&mute=1&loop=1&playlist=Q6l_9ehyywU"
  frameborder="0"
  allow="autoplay; encrypted-media"
  allowfullscreen>
</iframe>

<div class="container">
    <h1>ANO? TARA? Pre-Birthday Celeb mo? </h1>
    
    <div class="buttons">
        <button id="yesBtn">YEZZIR </button>
        <button id="noBtn">hindi po ate</button>
    </div>

    <div id="details">
        🎉 Syempre! Wala ka naman choice. 🎉 <br><br>
        📅 Date: April 11 <br>
        🕒 Time: 5:30 PM <br>
        📍 Location: secret, sunduin mo na ko para sabihin ko <br><br>
           Clue: 🎶 
    </div>
</div>

<script>
const noBtn = document.getElementById("noBtn");
const yesBtn = document.getElementById("yesBtn");
const details = document.getElementById("details");

// Move "No" button
function moveButton() {
    const container = document.querySelector(".buttons");
    const maxX = container.offsetWidth - noBtn.offsetWidth;
    const maxY = container.offsetHeight - noBtn.offsetHeight;

    const x = Math.random() * maxX;
    const y = Math.random() * maxY;

    noBtn.style.left = x + "px";
    noBtn.style.top = y + "px";
}

noBtn.addEventListener("mouseover", moveButton);
noBtn.addEventListener("click", moveButton);

// Show details + confetti
yesBtn.addEventListener("click", () => {
    details.style.display = "block";
    startConfetti();
});

// Simple confetti
const canvas = document.getElementById("confetti");
const ctx = canvas.getContext("2d");

canvas.width = window.innerWidth;
canvas.height = window.innerHeight;

let pieces = [];

function startConfetti() {
    for (let i = 0; i < 150; i++) {
        pieces.push({
            x: Math.random() * canvas.width,
            y: Math.random() * canvas.height,
            size: Math.random() * 8 + 2,
            speed: Math.random() * 3 + 1
        });
    }

    requestAnimationFrame(updateConfetti);
}

function updateConfetti() {
    ctx.clearRect(0, 0, canvas.width, canvas.height);

    pieces.forEach(p => {
        p.y += p.speed;
        if (p.y > canvas.height) p.y = 0;

        ctx.fillStyle = ["#ff0","#0f0","#00f","#f0f","#0ff"][Math.floor(Math.random()*5)];
        ctx.fillRect(p.x, p.y, p.size, p.size);
    });

    requestAnimationFrame(updateConfetti);
}
</script>

</body>
</html>
